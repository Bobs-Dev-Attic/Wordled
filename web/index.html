<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="Wordled - an offline Wordle clone you can play in airplane mode.">
  <meta name="theme-color" content="#121213">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Wordled">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Wordled</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: #121213;
    }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      transition: opacity 0.3s ease;
    }
    #loading .title {
      font-size: 34px;
      font-weight: 800;
      letter-spacing: 6px;
    }
    #loading .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #3a3a3c;
      border-top-color: #538d4e;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <img src="icons/Icon-192.png" width="96" height="96" alt="Wordled"
         style="border-radius:20px;" />
    <div class="title">WORDLED</div>
    <div class="spinner"></div>
  </div>

  <script>
    // Remove the splash once Flutter has rendered the first frame.
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('loading');
      if (el) {
        el.style.opacity = '0';
        setTimeout(function () { el.remove(); }, 350);
      }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
